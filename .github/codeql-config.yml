---
# CodeQL configuration for FileAssert
# Suppresses intentional generic catch clauses

name: "FileAssert CodeQL Config"

# Query filters to disable specific queries for certain paths
query-filters:
  - exclude:
      id: cs/catch-of-all-exceptions
    paths:
      - src/DemaConsulting.FileAssert/Context.cs
      - src/DemaConsulting.FileAssert/Validation.cs
  # Exclude path-combine warnings in PathHelpers (validated safe usage)
  - exclude:
      id: cs/path-combine
    paths:
      - src/DemaConsulting.FileAssert/PathHelpers.cs
