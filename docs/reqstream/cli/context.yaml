---
# Software Unit Requirements for the Context Class
#
# The Context class handles command-line argument parsing and program output.
# It is the primary interface between the user's command-line invocation and
# the tool's internal logic.

sections:
  - title: Context Unit Requirements
    requirements:
      - id: FileAssert-Context-ArgumentParsing
        title: The Context class shall parse command-line arguments into structured properties.
        justification: |
          Provides a standardized approach to command-line argument parsing and output
          handling across all DEMA Consulting DotNet Tools.
        tests:
          - Context_Create_NoArguments_ReturnsDefaultContext
          - Context_Create_VersionFlag_SetsVersionTrue
          - Context_Create_ShortVersionFlag_SetsVersionTrue
          - Context_Create_HelpFlag_SetsHelpTrue
          - Context_Create_ShortHelpFlag_H_SetsHelpTrue
          - Context_Create_ShortHelpFlag_Question_SetsHelpTrue
          - Context_Create_SilentFlag_SetsSilentTrue
          - Context_Create_ValidateFlag_SetsValidateTrue
          - Context_Create_ResultsFlag_SetsResultsFile
          - Context_Create_LogFlag_OpensLogFile

      - id: FileAssert-Context-InvalidArgs
        title: The Context class shall reject unknown or malformed command-line arguments with a descriptive error.
        justification: |
          Providing clear feedback for invalid arguments helps users quickly correct
          mistakes and prevents silent misconfiguration.
        tests:
          - Context_Create_UnknownArgument_ThrowsArgumentException
          - Context_Create_LogFlag_WithoutValue_ThrowsArgumentException
          - Context_Create_ResultsFlag_WithoutValue_ThrowsArgumentException

      - id: FileAssert-Context-Output
        title: The Context class shall write output to the console and optionally to a log file.
        justification: |
          Provides persistent logging for debugging and audit trails, while also
          allowing console output to be suppressed in automated environments.
        tests:
          - Context_WriteLine_NotSilent_WritesToConsole
          - Context_WriteLine_Silent_DoesNotWriteToConsole
          - Context_WriteError_WritesToLogFile

      - id: FileAssert-Context-Silent
        title: The Context class shall suppress console output when the silent flag is set.
        justification: |
          Enables automated scripts and CI/CD pipelines to run the tool without
          cluttering output logs.
        tests:
          - Context_Create_SilentFlag_SetsSilentTrue
          - Context_WriteLine_Silent_DoesNotWriteToConsole
          - Context_WriteError_Silent_DoesNotWriteToConsole

      - id: FileAssert-Context-ErrorOutput
        title: The Context class shall write error messages to stderr.
        justification: |
          Error messages must be written to stderr so they remain visible to the user
          without polluting stdout, which consumers may pipe or redirect for data capture.
        tests:
          - Context_WriteError_NotSilent_WritesToConsole
          - Context_WriteError_SetsErrorExitCode

      - id: FileAssert-Context-ExitCode
        title: The Context class shall track errors and expose a non-zero exit code when errors have occurred.
        justification: |
          Callers (scripts, CI/CD pipelines) must be able to detect failure conditions
          programmatically via the process exit code.
        tests:
          - Context_WriteError_SetsErrorExitCode

      - id: FileAssert-Context-ConfigFile
        title: The Context class shall expose a configuration file path defaulting to '.fileassert.yaml'.
        justification: |
          Defaulting to '.fileassert.yaml' allows the tool to work without additional
          arguments in the common case while still allowing users to specify an alternative
          configuration file via '--config'. Tracking whether the path was explicitly set
          allows the tool to distinguish between a missing default and a missing user-specified
          file and produce an appropriate message in each case.
        tests:
          - Context_Create_NoArguments_ConfigFileHasDefaultValue
          - Context_Create_ConfigFlag_SetsConfigFile
          - Context_Create_ConfigFlag_WithoutValue_ThrowsArgumentException

      - id: FileAssert-Context-Filters
        title: The Context class shall collect positional command-line arguments as test name or tag filters.
        justification: |
          Positional arguments are the conventional way to pass filter values to CLI tools.
          Treating non-flag arguments as filters allows users to run targeted test subsets
          without requiring a dedicated option flag, improving usability.
        tests:
          - Context_Create_NoArguments_FiltersIsEmpty
          - Context_Create_PositionalArguments_AddedToFilters
          - Context_Create_MixedArguments_ParsesCorrectly
          - Context_Create_UnknownFlagWithDash_ThrowsArgumentException

      - id: FileAssert-Context-ErrorCount
        title: The Context class shall expose an error count that increments each time WriteError is called.
        justification: |
          Callers that execute multiple named tests in sequence need to determine whether
          a specific test introduced new errors, independently of errors from previous tests.
          A monotonically incrementing error count allows the caller to take a snapshot
          before the test and compare after to derive a per-test pass/fail outcome without
          requiring a separate context per test.
        tests:
          - Context_ErrorCount_IncrementsOnEachWriteError
