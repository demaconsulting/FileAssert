---
# ReviewMark OTS Software Requirements
#
# Requirements for the ReviewMark file review tool functionality.

sections:
  - title: OTS Software Requirements
    sections:
      - title: ReviewMark Requirements
        requirements:
          - id: FileAssert-OTS-ReviewMark-Plan
            title: ReviewMark shall generate a review plan from the review configuration.
            justification: |
              The plan documents which files require review and the responsible reviewers.
            tags: [ots]
            tests:
              - ReviewMark_ReviewPlanGeneration

          - id: FileAssert-OTS-ReviewMark-Report
            title: ReviewMark shall generate a review report documenting review coverage and currency.
            justification: |
              The report is the auditable record showing which files have been reviewed and
              whether reviews are current with the source.
            tags: [ots]
            tests:
              - ReviewMark_ReviewReportGeneration

          - id: FileAssert-OTS-ReviewMark
            title: ReviewMark shall generate a review plan and review report from the review configuration.
            justification: |
              Composite requirement covering plan and report generation. This is a non-requirement
              grouping node; verification evidence is carried by the atomic child requirements,
              each of which covers one behavior (plan generation and report generation).
            tags: [ots]
            children:
              - FileAssert-OTS-ReviewMark-Plan
              - FileAssert-OTS-ReviewMark-Report
