---
# VersionMark OTS Software Requirements
#
# Requirements for the VersionMark version tracking tool functionality.

sections:
  - title: OTS Software Requirements
    sections:
      - title: VersionMark Requirements
        requirements:
          - id: FileAssert-OTS-VersionMark-Capture
            title: VersionMark shall capture tool-version information for each configured tool.
            justification: |
              VersionMark reads version metadata for each dotnet tool used in the pipeline so
              the release artifact records the exact tools that produced it.
            tags: [ots]
            tests:
              - VersionMark_CapturesVersions

          - id: FileAssert-OTS-VersionMark-Publish
            title: VersionMark shall publish the captured version information as a markdown report.
            justification: |
              The published markdown report is included in the release artifacts and serves as
              the human-readable evidence of tool versions used.
            tags: [ots]
            tests:
              - VersionMark_GeneratesMarkdownReport

          - id: FileAssert-OTS-VersionMark
            title: VersionMark shall capture and publish tool-version information.
            justification: |
              Composite requirement covering capture and publish behaviors. This is a non-requirement
              grouping node; verification evidence is carried by the atomic child requirements, each
              of which covers one behavior (capture and publish).
            tags: [ots]
            children:
              - FileAssert-OTS-VersionMark-Capture
              - FileAssert-OTS-VersionMark-Publish
