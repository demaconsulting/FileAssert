---
# xUnit OTS Software Requirements
#
# Requirements for the xUnit testing framework functionality.

sections:
  - title: OTS Software Requirements
    sections:
      - title: xUnit Requirements
        requirements:
          - id: FileAssert-OTS-xUnit-Discover
            title: xUnit shall discover all test methods annotated with `[Fact]` (or equivalent).
            justification: |
              The framework must locate every test the project has declared so that none are
              silently skipped. Successful test runs that report the expected number of cases
              are evidence of correct discovery.
            tags: [ots]
            tests:
              - Context_Create_NoArguments_ReturnsDefaultContext
              - PathHelpers_SafePathCombine_ValidPaths_CombinesCorrectly

          - id: FileAssert-OTS-xUnit-Execute
            title: xUnit shall execute the discovered tests and report each result.
            justification: |
              The framework must execute each discovered test and produce a pass/fail result
              that downstream tooling can consume.
            tags: [ots]
            # Test IDs below are FileAssert's own xUnit tests that exercise the framework. Each ID
            # matches a TestCase Name in the test TRX output (artifacts/**/*.trx in CI); ReqStream
            # consumes the artifacts/**/*.trx glob.
            tests:
              - Context_Create_NoArguments_ReturnsDefaultContext
              - Context_Create_VersionFlag_SetsVersionTrue
              - Context_Create_SilentFlag_SetsSilentTrue
              - Context_Create_LogFlag_OpensLogFile
              - Context_Create_UnknownArgument_ThrowsArgumentException
              - PathHelpers_SafePathCombine_ValidPaths_CombinesCorrectly
              - Program_Run_WithVersionFlag_DisplaysVersionOnly
              - Validation_Run_WithSilentContext_PrintsSummary
          - id: FileAssert-OTS-xUnit-Report
            title: xUnit shall produce TRX result files for requirements traceability.
            justification: |
              xUnit with xunit.runner.visualstudio produces TRX output format files that are
              consumed by ReqStream to verify requirements coverage. Each passing test provides
              evidence for the requirements it covers, providing continuous compliance traceability.
            tags: [ots]
            # Test IDs below are FileAssert's own xUnit tests that exercise the framework. Each ID
            # matches a TestCase Name in the test TRX output (artifacts/**/*.trx in CI); ReqStream
            # consumes the artifacts/**/*.trx glob.
            tests:
              - Context_Create_NoArguments_ReturnsDefaultContext
              - Context_Create_VersionFlag_SetsVersionTrue
              - Context_Create_SilentFlag_SetsSilentTrue
              - Context_Create_LogFlag_OpensLogFile
              - Context_Create_UnknownArgument_ThrowsArgumentException
              - PathHelpers_SafePathCombine_ValidPaths_CombinesCorrectly
              - Program_Run_WithVersionFlag_DisplaysVersionOnly
              - Validation_Run_WithSilentContext_PrintsSummary
