---
# Software Unit Requirements for the TemporaryDirectory Class
#
# The TemporaryDirectory class manages the lifecycle of a disposable temporary
# directory rooted under Environment.CurrentDirectory. It provides safe path
# construction via GetFilePath and guarantees cleanup on Dispose.

sections:
  - title: TemporaryDirectory Unit Requirements
    requirements:
      - id: FileAssert-TemporaryDirectory-Lifecycle
        title: The TemporaryDirectory class shall create a unique directory on construction and delete it on disposal.
        justification: |
          Tests that rely on isolated scratch space must not interfere with one another
          or leave artifacts on disk. Creating a unique directory per instance prevents
          collisions between concurrent or sequential tests, and deleting it on disposal
          ensures the working directory is left clean even if the test fails or throws.
        tests:
          - TemporaryDirectory_Constructor_CreatesDirectory
          - TemporaryDirectory_Constructor_CreatesUniqueDirectories
          - TemporaryDirectory_Dispose_DeletesDirectory
          - TemporaryDirectory_Dispose_AlreadyDeleted_DoesNotThrow

      - id: FileAssert-TemporaryDirectory-SafePath
        title: The TemporaryDirectory class shall construct safe file paths under the temporary directory and create intermediate
          subdirectories.
        justification: |
          Callers supply relative file paths to GetFilePath to resolve output locations
          inside the temporary directory. Using PathHelpers.SafePathCombine ensures that
          path-traversal attempts (e.g., "../escaped.txt") are rejected with a clear
          ArgumentException, preventing accidental or malicious writes outside the
          sandbox. Creating intermediate subdirectories automatically removes boilerplate
          from callers that write to nested paths.
        tests:
          - TemporaryDirectory_GetFilePath_SimpleFile_ReturnsPathUnderDirectory
          - TemporaryDirectory_GetFilePath_NestedPath_CreatesIntermediateDirectories
          - TemporaryDirectory_GetFilePath_TraversalAttempt_ThrowsArgumentException
