---
# Software Unit Requirements for the Validation Class
#
# The Validation class provides the self-validation framework, running tests
# that demonstrate the tool is functioning correctly in the deployment environment.
# It supports writing results to TRX (MSTest) or JUnit XML format.

sections:
  - title: Validation Unit Requirements
    requirements:
      - id: FileAssert-Validation-Run
        title: The Validation class shall run self-validation tests and print a summary.
        justification: |
          Provides a built-in mechanism to verify the tool is functioning correctly
          in the deployment environment. A summary is printed for human review.
        tests:
          - Validation_Run_WithSilentContext_PrintsSummary
          - Validation_Run_WithSilentContext_ExitCodeIsZero

      - id: FileAssert-Validation-Results
        title: The Validation class shall write test results to a file in TRX or JUnit format.
        justification: |
          Enables integration with CI/CD systems that expect standard test result formats.
          TRX format is compatible with MSTest; JUnit XML is compatible with many CI tools.
        tests:
          - Validation_Run_WithTrxResultsFile_WritesTrxFile
          - Validation_Run_WithXmlResultsFile_WritesXmlFile
          - Validation_Run_WithUnsupportedResultsFormat_DoesNotWriteFile

      - id: FileAssert-Validation-ResultsTest
        title: The Validation class shall include a self-test that verifies results file generation.
        justification: |
          Demonstrates that passing and failing test outcomes are produced correctly and that
          the --results flag causes a results file to be written. This provides evidence that
          the results generation feature works in the deployment environment.
        tests:
          - Validation_Run_WithSilentContext_LogContainsFileAssertResults

      - id: FileAssert-Validation-ExistsTest
        title: The Validation class shall include a self-test that verifies file-existence checking.
        justification: |
          Demonstrates that glob-pattern file-existence assertions work correctly in the
          deployment environment, providing evidence that the core file-matching feature
          is functioning as expected.
        tests:
          - Validation_Run_WithSilentContext_LogContainsFileAssertExists

      - id: FileAssert-Validation-ContainsTest
        title: The Validation class shall include a self-test that verifies file-content checking.
        justification: |
          Demonstrates that text-contains assertions work correctly in the deployment
          environment, providing evidence that the file content inspection feature
          is functioning as expected.
        tests:
          - Validation_Run_WithSilentContext_LogContainsFileAssertContains

      - id: FileAssert-Validation-NullContext
        title: The Validation class shall reject a null context argument.
        justification: |
          Null context would cause a NullReferenceException deep in the validation
          logic. Explicit null validation with ArgumentNullException provides a
          clear, actionable error at the point of invalid input.
        tests:
          - Validation_Run_NullContext_ThrowsArgumentNullException
