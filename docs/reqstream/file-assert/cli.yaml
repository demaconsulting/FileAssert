---
# Software Subsystem Requirements for the Cli Subsystem
#
# The Cli subsystem is responsible for translating the raw command-line argument
# array into a structured, immutable context object and providing a unified
# interface for output and logging throughout the tool's execution.

sections:
  - title: Cli Subsystem Requirements
    requirements:
      - id: FileAssert-Cli-ArgumentParsing
        title: The Cli subsystem shall parse command-line arguments into recognized flags and values.
        justification: |
          A dedicated argument-parsing subsystem provides a single point of truth for all
          command-line interface logic, keeping the rest of the tool free of raw argument
          handling. It also enables consistent unit and integration testing of argument
          behavior independently of business logic.
        children:
          - FileAssert-Context-ArgumentParsing
          - FileAssert-Context-InvalidArgs
        tests:
          - Cli_CreateContext_ParsesSilentValidateAndLogFlags
          - Cli_CreateContext_ParsesVersionHelpConfigResultsFlags
          - Cli_CreateContext_UnknownArgument_ThrowsArgumentException

      - id: FileAssert-Cli-ArgumentExposure
        title: The Cli subsystem shall expose parsed argument values as typed properties on the Context object.
        justification: |
          Exposing parsed arguments as typed properties provides a strongly-typed interface
          for downstream subsystems, eliminating repeated string parsing and making argument
          access self-documenting.
        children:
          - FileAssert-Context-ConfigFile
          - FileAssert-Context-Filters
          - FileAssert-Context-Depth
        tests:
          - Cli_CreateContext_ParsesSilentValidateAndLogFlags
          - Cli_CreateContext_ParsesVersionHelpConfigResultsFlags
          - Cli_CreateContext_WithFilters_ParsesPositionalArguments
          - Cli_CreateContext_ParsesDepthFlag

      - id: FileAssert-Cli-ErrorReporting
        title: The Cli subsystem shall set the exit code to 1 when errors are reported.
        justification: |
          A non-zero exit code is the standard Unix convention for indicating failure.
          Setting the exit code to 1 as soon as any error is written ensures that
          CI/CD pipelines and calling scripts can reliably detect failures.
        children:
          - FileAssert-Context-ExitCode
          - FileAssert-Context-ErrorCount
        tests:
          - Cli_WriteError_AfterSuccessfulCreate_ChangesExitCodeToOne

      - id: FileAssert-Cli-OutputPipeline
        title: The Cli subsystem shall route output and errors to the console and optional log file.
        justification: |
          A unified output pipeline ensures that all messages, whether informational or
          error-level, are consistently written to both the console and any active log file.
          This provides a reliable audit trail for automated environments and CI/CD pipelines.
        children:
          - FileAssert-Context-Output
          - FileAssert-Context-Silent
          - FileAssert-Context-ErrorOutput
        tests:
          - Cli_OutputPipeline_WithLogPathAndSilentFlag_WritesMessagesToLogFile
          - Cli_OutputPipeline_WithoutSilentFlag_WritesMessagesToConsole

      - id: FileAssert-Cli-ScopedContext
        title: The Cli subsystem shall provide a scoped context that prepends a path prefix to every error message, enabling
          breadcrumb-style error reporting in nested assertions.
        justification: |
          When asserting files inside a zip archive, error messages must identify both the
          archive and the entry that failed. A scoped context wrapper created via
          IContext.WithPrefix prepends the archive name to all error messages, giving users
          immediate context without requiring each asserter to format breadcrumb paths
          explicitly. Nesting multiple scoped contexts supports zip-in-zip scenarios.
        children:
          - FileAssert-IContext-OutputContract
        tests:
          - Context_WithPrefix_ReturnsNonNullScopedContext
          - ScopedContext_WriteError_PropagatesExitCodeToRoot
          - ScopedContext_Nested_WriteError_PropagatesExitCodeToRoot
