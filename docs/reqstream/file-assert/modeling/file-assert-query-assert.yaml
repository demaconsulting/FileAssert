---
# Software Unit Requirements for the FileAssertQueryAssert Class
#
# The FileAssertQueryAssert class holds the query string and count constraints for a single
# structured-document query assertion. It is shared by FileAssertXmlAssert, FileAssertHtmlAssert,
# FileAssertYamlAssert, and FileAssertJsonAssert to provide consistent constraint logic and
# error messages across all supported structured-document formats.

sections:
  - title: FileAssertQueryAssert Unit Requirements
    requirements:
      - id: FileAssert-FileAssertQueryAssert-Creation
        title: |
          The FileAssertQueryAssert class shall be constructed from a query assertion data object
          with a non-empty query string and at least one count constraint declared.
        justification: |
          Requiring a non-empty query string prevents silent no-op assertions that would pass
          vacuously. Requiring at least one of Count, Min, or Max ensures that every query
          assertion actually validates something rather than just executing a query and
          discarding the result.
        tests: []

      - id: FileAssert-FileAssertQueryAssert-CountConstraints
        title: |
          The FileAssertQueryAssert class shall apply min, max, and exact count constraints to
          the match count provided by the caller and report an error for each violated constraint.
        justification: |
          Centralising constraint evaluation in a shared class ensures that all four
          structured-document assert units (XML, HTML, YAML, JSON) produce identical error
          messages and behave consistently. Reporting each violated constraint independently
          allows users to see all failures in a single pass without short-circuiting.
        tests: []
