---
# Software Unit Requirements for the FileAssertFile Class
#
# The FileAssertFile class locates files using a glob pattern, enforces optional
# minimum and maximum count constraints, and applies a collection of content rules
# to every matched file.

sections:
  - title: FileAssertFile Unit Requirements
    requirements:
      - id: FileAssert-FileAssertFile-Creation
        title: The FileAssertFile class shall be constructed from validated configuration data.
        justification: |
          Centralizing validation in the factory prevents invalid configurations from
          reaching the execution phase and makes the contract of required fields explicit.
          Rejecting null or blank patterns at creation time provides an early, actionable
          error rather than a silent skip or runtime exception during file search.
        tests:
          - FileAssertFile_Create_ValidData_CreatesFile
          - FileAssertFile_Create_NullData_ThrowsArgumentNullException
          - FileAssertFile_Create_NullPattern_ThrowsInvalidOperationException
          - FileAssertFile_Create_BlankPattern_ThrowsInvalidOperationException

      - id: FileAssert-FileAssertFile-MinCountConstraint
        title: The FileAssertFile class shall enforce an optional minimum file count constraint.
        justification: |
          The minimum-count constraint catches missing required artifacts (such as a build
          output that should always be produced). Reporting the count mismatch up front
          avoids misleading downstream errors.
        tests:
          - FileAssertFile_Run_TooFewFiles_WritesError
          - FileAssertFile_Run_NoMatchingFiles_NoConstraints_NoError

      - id: FileAssert-FileAssertFile-MaxCountConstraint
        title: The FileAssertFile class shall enforce an optional maximum file count constraint.
        justification: |
          The maximum-count constraint catches unexpected duplicate or extra outputs. As
          with the minimum, the bound is checked before content rules to avoid misleading
          downstream errors.
        tests:
          - FileAssertFile_Run_TooManyFiles_WritesError
          - FileAssertFile_Run_WithMatchingFiles_NoConstraints_NoError

      - id: FileAssert-FileAssertFile-CountConstraints
        title: |
          The FileAssertFile class shall combine the minimum- and maximum-count constraints
          into a single count check applied before content rules.
        justification: |
          Treating the bounds as a single behavior ensures consistent ordering: the count
          check always runs first so that pattern-cardinality failures are reported before
          per-file content errors.
        children:
          - FileAssert-FileAssertFile-MinCountConstraint
          - FileAssert-FileAssertFile-MaxCountConstraint
        tests:
          - FileAssertFile_Run_NoMatchingFiles_NoConstraints_NoError
          - FileAssertFile_Run_WithMatchingFiles_NoConstraints_NoError

      - id: FileAssert-FileAssertFile-ContentRules
        title: The FileAssertFile class shall apply content rules to every matched file when rules are defined.
        justification: |
          Content rules are evaluated against each matching file's text so that every
          file in the matched set is individually validated. This ensures that adding
          new files does not silently bypass compliance checks.
        tests:
          - FileAssertFile_Run_WithContentRule_ContentContainsValue_NoError
          - FileAssertFile_Run_WithContentRule_ContentMissingValue_WritesError
          - FileAssertFile_Run_MultipleFiles_MultipleFailContentRule_WritesErrorForEachViolation

      - id: FileAssert-FileAssertFile-ExactCount
        title: The FileAssertFile class shall enforce an exact file count constraint when declared.
        justification: |
          The exact count constraint is a strict variant of the min/max bounds and is
          needed when the user must assert that a pattern matches precisely the declared
          number of files. It is checked after the min/max constraints and before per-file
          rules to provide a clear, early failure when the count is wrong.
        tests:
          - FileAssertFile_Run_WrongCount_WritesError

      - id: FileAssert-FileAssertFile-MinSize
        title: The FileAssertFile class shall enforce an optional minimum-size constraint on each matched file.
        justification: |
          The minimum-size constraint guards against empty or near-empty outputs (for example,
          a generated report that compiled successfully but produced no content).
        tests:
          - FileAssertFile_Run_TooSmall_WritesError

      - id: FileAssert-FileAssertFile-MaxSize
        title: The FileAssertFile class shall enforce an optional maximum-size constraint on each matched file.
        justification: |
          The maximum-size constraint catches unexpectedly large outputs and prevents
          misleading downstream content rules from reading bloated files.
        tests:
          - FileAssertFile_Run_TooLarge_WritesError

      - id: FileAssert-FileAssertFile-SizeConstraints
        title: |
          The FileAssertFile class shall apply min-size and max-size constraints to each
          matched file before reading its content.
        justification: |
          Combining the per-file size checks into one stage ensures every matched file is
          individually bounded and that size violations are reported before any I/O is
          performed for content rules.
        children:
          - FileAssert-FileAssertFile-MinSize
          - FileAssert-FileAssertFile-MaxSize
        tests:
          - FileAssertFile_Run_MultipleFiles_MultipleViolateSizeConstraints_WritesErrorForEachViolation

      - id: FileAssert-FileAssertFile-FileTypeAssertDelegation
        title: |
          The FileAssertFile class shall evaluate the file-type-specific assertion
          block configured for each matched file.
        justification: |
          Delegating file-type assertions to dedicated units keeps FileAssertFile free of
          format-specific parsing and assertion logic, making each unit independently testable
          and the overall design extensible to future formats.
        tests:
          - FileAssertFile_Create_ValidData_CreatesFile
          - FileAssertFile_Run_WithContentRule_ContentContainsValue_NoError
          - FileAssertFile_Run_WithContentRule_ContentMissingValue_WritesError
