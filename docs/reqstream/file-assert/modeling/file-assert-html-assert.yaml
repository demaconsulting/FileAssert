---
# Software Unit Requirements for the FileAssertHtmlAssert Class
#
# The FileAssertHtmlAssert class parses matched files as HTML documents using HtmlAgilityPack
# and applies XPath-based node count assertions.

sections:
  - title: FileAssertHtmlAssert Unit Requirements
    requirements:
      - id: FileAssert-FileAssertHtmlAssert-Creation
        title: The FileAssertHtmlAssert class shall be constructed from a list of query assertion data objects.
        justification: |
          Constructing query assertion models at creation time ensures that configuration
          errors are detected before any file system or HTML parsing operations are attempted.
        tests:
          - FileAssertHtmlAssert_Create_ValidData_CreatesHtmlAssert
          - FileAssertHtmlAssert_Create_NullData_ThrowsArgumentNullException

      - id: FileAssert-FileAssertHtmlAssert-ParseError
        title: >-
          The FileAssertHtmlAssert class shall report an immediate error and skip remaining
          assertions when a matched file cannot be read (e.g., file does not exist or is inaccessible).
        justification: |
          HtmlAgilityPack parses HTML leniently without throwing exceptions. The primary error
          condition handled is a missing or inaccessible file. Reporting the I/O failure
          immediately gives users a clear, actionable error message.
        tests:
          - FileAssertHtmlAssert_Run_NonExistentFile_WritesError
          - FileAssertHtmlAssert_Run_UnauthorizedAccess_WritesError

      - id: FileAssert-FileAssertHtmlAssert-QueryAssertions
        title: |
          The FileAssertHtmlAssert class shall evaluate each configured XPath query against
          the parsed HTML document and apply min, max, and exact count constraints to the
          number of matching nodes.
        justification: |
          XPath node count assertions over HTML documents allow users to verify page structure
          such as title presence, link counts, and heading hierarchy in generated documentation
          and static site outputs.
        tests:
          - FileAssertHtmlAssert_Run_ExactCount_Matches_NoError
          - FileAssertHtmlAssert_Run_ExactCount_Mismatch_WritesError
          - FileAssertHtmlAssert_Run_MinMaxCount_WithinBounds_NoError
          - FileAssertHtmlAssert_Run_MinCount_BelowMinimum_WritesError
          - FileAssertHtmlAssert_Run_MaxCount_ExceedsMaximum_WritesError
          - FileAssertHtmlAssert_Run_NonExistentFile_WritesError
          - FileAssertHtmlAssert_Run_InvalidXPathQuery_WritesError
          - FileAssertHtmlAssert_Run_XPathExactTextMatch_Matches_NoError
          - FileAssertHtmlAssert_Run_XPathExactTextMatch_NoMatch_WritesError
          - FileAssertHtmlAssert_Run_XPathContainsText_Matches_NoError
          - FileAssertHtmlAssert_Run_XPathContainsText_NoMatch_WritesError
