---
# Software Subsystem Requirements for the Modeling Subsystem
#
# The Modeling subsystem contains the domain objects that represent a FileAssert
# test suite at runtime. It transforms Configuration DTOs into executable domain
# objects and drives the assertion logic through the test-file-rule hierarchy.

sections:
  - title: Modeling Subsystem Requirements
    requirements:
      - id: FileAssert-Modeling-ExecutionChain
        title: The Modeling subsystem shall report success for a test-file-rule chain only when all of its constraints are
          met.
        justification: |
          The Modeling subsystem integrates three unit types (FileAssertTest, FileAssertFile,
          FileAssertRule) into a single execution chain. Verifying the chain end-to-end at the
          subsystem level ensures that inter-unit delegation and data flow work correctly.
        children:
          - FileAssert-FileAssertTest-Creation
          - FileAssert-FileAssertTest-Filtering
          - FileAssert-FileAssertTest-Execution
          - FileAssert-FileAssertTest-RunValidation
          - FileAssert-FileAssertFile-Creation
          - FileAssert-FileAssertFile-MinCountConstraint
          - FileAssert-FileAssertFile-MaxCountConstraint
          - FileAssert-FileAssertFile-ContentRules
          - FileAssert-FileAssertFile-ExactCount
          - FileAssert-FileAssertFile-MinSize
          - FileAssert-FileAssertFile-MaxSize
          - FileAssert-FileAssertFile-FileTypeAssertDelegation
          - FileAssert-FileAssertRule-Factory
          - FileAssert-FileAssertRule-ContainsRule
          - FileAssert-FileAssertRule-MatchesRule
          - FileAssert-FileAssertRule-DoesNotContainRule
          - FileAssert-FileAssertRule-DoesNotContainRegexRule
          - FileAssert-FileAssertZipAssert-EntryMatching
        tests:
          - Modeling_ExecuteChain_PassesWhenAllConstraintsMet

      - id: FileAssert-Modeling-FailureReporting
        title: The Modeling subsystem shall report failures through the context when assertions are violated.
        justification: |
          Assertion failures must propagate from the innermost rule through the file and test
          layers to the context, setting the error exit code. Testing this at the subsystem
          level verifies that the full error-reporting pipeline within the subsystem works.
        children:
          - FileAssert-FileAssertTest-Execution
          - FileAssert-FileAssertFile-MinCountConstraint
          - FileAssert-FileAssertFile-MaxCountConstraint
          - FileAssert-FileAssertFile-ContentRules
          - FileAssert-FileAssertFile-MinSize
          - FileAssert-FileAssertFile-MaxSize
        tests:
          - Modeling_ExecuteChain_ReportsFailuresThroughContext

      - id: FileAssert-Modeling-FileTypeParsing-Text
        title: The Modeling subsystem shall read matched files as plain text when a `text:` block is declared.
        justification: |
          The text path is the simplest format and exercises the rule pipeline directly.
        children:
          - FileAssert-FileAssertTextAssert-Creation
          - FileAssert-FileAssertTextAssert-RuleApplication
        tests:
          - Modeling_ExecuteChain_PassesWhenAllConstraintsMet

      - id: FileAssert-Modeling-FileTypeParsing-Pdf
        title: The Modeling subsystem shall parse matched files as PDF documents when a `pdf:` block is declared.
        justification: |
          PDF parsing is required to apply metadata, page-count, and body-text assertions.
        children:
          - FileAssert-FileAssertPdfAssert-Creation
          - FileAssert-FileAssertPdfAssert-MetadataAssertions
          - FileAssert-FileAssertPdfAssert-PageCountAssertions
          - FileAssert-FileAssertPdfAssert-TextAssertions
        tests:
          - FileAssertPdfAssert_Run_ValidPdf_PageCountSatisfied_NoError

      - id: FileAssert-Modeling-FileTypeParsing-Xml
        title: The Modeling subsystem shall parse matched files as XML documents when an `xml:` block is declared.
        justification: |
          XML parsing supports XPath queries against XML reports.
        children:
          - FileAssert-FileAssertXmlAssert-Creation
          - FileAssert-FileAssertXmlAssert-QueryValidation
        tests:
          - Modeling_QueryAssertions_XmlQueryMeetsCount_NoError

      - id: FileAssert-Modeling-FileTypeParsing-Html
        title: The Modeling subsystem shall parse matched files as HTML documents when an `html:` block is declared.
        justification: |
          HTML parsing supports XPath queries against HTML reports (lenient parser).
        children:
          - FileAssert-FileAssertHtmlAssert-Creation
        tests:
          - FileAssertHtmlAssert_Run_ExactCount_Matches_NoError

      - id: FileAssert-Modeling-FileTypeParsing-Yaml
        title: The Modeling subsystem shall parse matched files as YAML documents when a `yaml:` block is declared.
        justification: |
          YAML parsing supports dot-notation path queries against YAML configuration files.
        children:
          - FileAssert-FileAssertYamlAssert-Creation
        tests:
          - FileAssertYamlAssert_Run_SequenceCount_Matches_NoError

      - id: FileAssert-Modeling-FileTypeParsing-Json
        title: The Modeling subsystem shall parse matched files as JSON documents when a `json:` block is declared.
        justification: |
          JSON parsing supports dot-notation path queries against JSON outputs.
        children:
          - FileAssert-FileAssertJsonAssert-Creation
        tests:
          - FileAssertJsonAssert_Run_ArrayCount_Matches_NoError

      - id: FileAssert-Modeling-FileTypeParsing-Zip
        title: The Modeling subsystem shall parse matched files as ZIP archives when a `zip:` block is declared.
        justification: |
          ZIP parsing exposes archive entries to the IFileContainer abstraction.
        children:
          - FileAssert-FileAssertZipAssert-Creation
        tests:
          - FileAssertZipAssert_Run_MatchingEntriesMeetConstraints_NoError

      - id: FileAssert-Modeling-FileTypeParsing
        title: |
          The Modeling subsystem shall parse matched files as structured documents (PDF, XML,
          HTML, YAML, JSON, ZIP) when the corresponding assertion block is declared.
        justification: |
          Composite requirement decomposed per file format; each child carries the specific
          parser binding.
        children:
          - FileAssert-Modeling-FileTypeParsing-Text
          - FileAssert-Modeling-FileTypeParsing-Pdf
          - FileAssert-Modeling-FileTypeParsing-Xml
          - FileAssert-Modeling-FileTypeParsing-Html
          - FileAssert-Modeling-FileTypeParsing-Yaml
          - FileAssert-Modeling-FileTypeParsing-Json
          - FileAssert-Modeling-FileTypeParsing-Zip
        tests:
          - Modeling_FileTypeParsing_ValidPdf_ParsesAndAppliesPageCount_NoError

      - id: FileAssert-Modeling-FileTypeParseError
        title: |
          The Modeling subsystem shall report an immediate error when a matched file cannot be
          parsed as the structured-document type declared by its assertion block.
        justification: |
          Reporting an immediate error on parse failure prevents misleading partial results from
          downstream assertions. This requirement covers content parse failures only; failures to
          read a matched file due to I/O errors are a separate concern covered by the file-type
          read-error requirement.
        children:
          - FileAssert-FileAssertPdfAssert-ParseError
          - FileAssert-FileAssertXmlAssert-ParseError
          - FileAssert-FileAssertHtmlAssert-ParseError
          - FileAssert-FileAssertYamlAssert-ParseErrorReported
          - FileAssert-FileAssertYamlAssert-ParseErrorSkipsRemaining
          - FileAssert-FileAssertJsonAssert-ParseError
          - FileAssert-FileAssertZipAssert-ParseError
        tests:
          - Modeling_FileTypeParsing_InvalidXml_ReportsParseError

      - id: FileAssert-Modeling-QueryAssertions-Xml
        title: |
          The Modeling subsystem shall report an XML XPath assertion as failed when the
          number of nodes selected does not satisfy the declared count constraint.
        justification: |
          XML XPath queries are the primary structured-document assertion for XML reports.
        children:
          - FileAssert-FileAssertXmlAssert-QueryAssertions
        tests:
          - Modeling_QueryAssertions_XmlQueryMeetsCount_NoError

      - id: FileAssert-Modeling-QueryAssertions-Html
        title: |
          The Modeling subsystem shall report an HTML XPath assertion as failed when the
          number of nodes selected does not satisfy the declared count constraint.
        justification: |
          HTML XPath queries are the primary structured-document assertion for HTML reports.
        children:
          - FileAssert-FileAssertHtmlAssert-QueryAssertions
        tests:
          - Modeling_QueryAssertions_HtmlQueryMeetsCount_NoError

      - id: FileAssert-Modeling-QueryAssertions-Yaml
        title: |
          The Modeling subsystem shall report a YAML dot-notation query as failed when the
          number of selected scalars/sequences does not satisfy the declared count constraint.
        justification: |
          YAML queries are the primary structured-document assertion for YAML configuration files.
        children:
          - FileAssert-FileAssertYamlAssert-QueryTraversal
          - FileAssert-FileAssertYamlAssert-QueryMinCount
          - FileAssert-FileAssertYamlAssert-QueryMaxCount
          - FileAssert-FileAssertYamlAssert-QueryExactCount
        tests:
          - Modeling_QueryAssertions_YamlQueryMeetsCount_NoError

      - id: FileAssert-Modeling-QueryAssertions-Json
        title: |
          The Modeling subsystem shall report a JSON dot-notation query as failed when the
          number of selected scalars/arrays does not satisfy the declared count constraint.
        justification: |
          JSON queries are the primary structured-document assertion for JSON outputs.
        children:
          - FileAssert-FileAssertJsonAssert-QueryAssertions
        tests:
          - Modeling_QueryAssertions_JsonQueryMeetsCount_NoError

      - id: FileAssert-Modeling-QueryAssertions
        title: |
          The Modeling subsystem shall report a structured-document query assertion (XPath for XML
          and HTML; dot-notation paths for YAML and JSON) as failed when the number of nodes the
          query matches does not satisfy the assertion's declared count constraint.
        justification: |
          Composite requirement decomposed per file format.
        children:
          - FileAssert-Modeling-QueryAssertions-Xml
          - FileAssert-Modeling-QueryAssertions-Html
          - FileAssert-Modeling-QueryAssertions-Yaml
          - FileAssert-Modeling-QueryAssertions-Json
        tests:
          - Modeling_QueryAssertions_XmlQueryMeetsCount_NoError

      - id: FileAssert-Modeling-ZipEntryContentAssertions-Text
        title: The Modeling subsystem shall apply text content rules to matched zip archive entries.
        justification: |
          Verifies the simplest content asserter (text) flows through ZipFileContainer correctly.
        children:
          - FileAssert-FileAssertZipAssert-EntryMatching
        tests:
          - FileAssertZipAssert_Run_EntryContainsRequiredText_NoError

      - id: FileAssert-Modeling-ZipEntryContentAssertions-Xml
        title: The Modeling subsystem shall apply XML XPath rules to matched zip archive entries.
        justification: |
          Verifies XML asserter integration with the IFileContainer abstraction.
        tests:
          - FileAssertZipAssert_Run_EntryXmlMatchesXPath_NoError

      - id: FileAssert-Modeling-ZipEntryContentAssertions-Yaml
        title: The Modeling subsystem shall apply YAML query rules to matched zip archive entries.
        justification: |
          Verifies YAML asserter integration with the IFileContainer abstraction.
        tests:
          - FileAssertZipAssert_Run_EntryYamlMatchesQuery_NoError

      - id: FileAssert-Modeling-ZipEntryContentAssertions-Json
        title: The Modeling subsystem shall apply JSON query rules to matched zip archive entries.
        justification: |
          Verifies JSON asserter integration with the IFileContainer abstraction.
        tests:
          - FileAssertZipAssert_Run_EntryJsonMatchesQuery_NoError

      - id: FileAssert-Modeling-ZipEntryContentAssertions
        title: |
          The Modeling subsystem shall apply the full content assertion suite (text, xml, yaml,
          json) to matched zip archive entries.
        justification: |
          Composite requirement decomposed per content asserter.
        children:
          - FileAssert-Modeling-ZipEntryContentAssertions-Text
          - FileAssert-Modeling-ZipEntryContentAssertions-Xml
          - FileAssert-Modeling-ZipEntryContentAssertions-Yaml
          - FileAssert-Modeling-ZipEntryContentAssertions-Json
        tests:
          - Modeling_ZipEntryContentAssertions_TextContentPassesWhenConstraintsMet

      - id: FileAssert-Modeling-ZipEntryBreadcrumbReporting
        title: |
          The Modeling subsystem shall propagate zip entry assertion failures through a scoped
          context that produces breadcrumb-style error messages identifying the failing entry.
        justification: |
          Breadcrumb error messages must propagate correctly through the scoped context so that
          users receive actionable failure output identifying both the archive and the entry that
          failed, including for archives nested inside other archives.
        children:
          - FileAssert-FileAssertZipAssert-BreadcrumbErrors
        tests:
          - Modeling_ZipEntryContentAssertions_FailureReportsWithBreadcrumbs
