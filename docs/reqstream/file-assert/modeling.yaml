---
# Software Subsystem Requirements for the Modeling Subsystem
#
# The Modeling subsystem contains the domain objects that represent a FileAssert
# test suite at runtime. It transforms Configuration DTOs into executable domain
# objects and drives the assertion logic through the test-file-rule hierarchy.

sections:
  - title: Modeling Subsystem Requirements
    requirements:
      - id: FileAssert-Modeling-ExecutionChain
        title: The Modeling subsystem shall execute the full test-file-rule chain and pass when all constraints are met.
        justification: |
          The Modeling subsystem integrates three unit types (FileAssertTest, FileAssertFile,
          FileAssertRule) into a single execution chain. Verifying the chain end-to-end at the
          subsystem level ensures that inter-unit delegation and data flow work correctly.
        children:
          - FileAssert-FileAssertTest-Creation
          - FileAssert-FileAssertTest-Filtering
          - FileAssert-FileAssertTest-Execution
          - FileAssert-FileAssertTest-RunValidation
          - FileAssert-FileAssertFile-Creation
          - FileAssert-FileAssertFile-CountConstraints
          - FileAssert-FileAssertFile-ContentRules
          - FileAssert-FileAssertFile-ExactCount
          - FileAssert-FileAssertFile-SizeConstraints
          - FileAssert-FileAssertFile-FileTypeAssertDelegation
          - FileAssert-FileAssertRule-Factory
          - FileAssert-FileAssertRule-ContainsRule
          - FileAssert-FileAssertRule-MatchesRule
          - FileAssert-FileAssertRule-DoesNotContainRule
          - FileAssert-FileAssertRule-DoesNotContainRegexRule
          - FileAssert-FileAssertZipAssert-EntryMatching
        tests:
          - Modeling_ExecuteChain_PassesWhenAllConstraintsMet

      - id: FileAssert-Modeling-FailureReporting
        title: The Modeling subsystem shall report failures through the context when assertions are violated.
        justification: |
          Assertion failures must propagate from the innermost rule through the file and test
          layers to the context, setting the error exit code. Testing this at the subsystem
          level verifies that the full error-reporting pipeline within the subsystem works.
        children:
          - FileAssert-FileAssertTest-Execution
          - FileAssert-FileAssertFile-CountConstraints
          - FileAssert-FileAssertFile-ContentRules
          - FileAssert-FileAssertFile-SizeConstraints
        tests:
          - Modeling_ExecuteChain_ReportsFailuresThroughContext

      - id: FileAssert-Modeling-FileTypeParsing
        title: |
          The Modeling subsystem shall parse matched files as structured documents (PDF, XML,
          HTML, YAML, JSON, ZIP) when the corresponding assertion block is declared, and report
          an immediate error if the file cannot be parsed.
        justification: |
          File-type parsing enables structured-document assertions (metadata, XPath, dot-notation
          paths) that are not possible with plain-text content rules. Reporting an immediate
          error on parse failure prevents misleading partial results from downstream assertions.
        children:
          - FileAssert-FileAssertTextAssert-Creation
          - FileAssert-FileAssertTextAssert-RuleApplication
          - FileAssert-FileAssertTextAssert-IOError
          - FileAssert-FileAssertPdfAssert-Creation
          - FileAssert-FileAssertPdfAssert-ParseError
          - FileAssert-FileAssertPdfAssert-MetadataAssertions
          - FileAssert-FileAssertPdfAssert-PageCountAssertions
          - FileAssert-FileAssertPdfAssert-TextAssertions
          - FileAssert-FileAssertXmlAssert-Creation
          - FileAssert-FileAssertXmlAssert-ParseError
          - FileAssert-FileAssertHtmlAssert-Creation
          - FileAssert-FileAssertHtmlAssert-ParseError
          - FileAssert-FileAssertYamlAssert-Creation
          - FileAssert-FileAssertYamlAssert-ParseError
          - FileAssert-FileAssertJsonAssert-Creation
          - FileAssert-FileAssertJsonAssert-ParseError
          - FileAssert-FileAssertZipAssert-Creation
          - FileAssert-FileAssertZipAssert-ParseError
        tests:
          - Modeling_FileTypeParsing_InvalidXml_ReportsParseError

      - id: FileAssert-Modeling-QueryAssertions
        title: |
          The Modeling subsystem shall evaluate structured-document query assertions (XPath
          for XML and HTML; dot-notation paths for YAML and JSON) and apply count constraints
          to the number of matching nodes.
        justification: |
          Query-based assertions at the subsystem level verify that the parsing and assertion
          pipeline integrates correctly across all supported structured-document formats without
          requiring format-specific integration tests at the subsystem level.
        children:
          - FileAssert-FileAssertXmlAssert-QueryAssertions
          - FileAssert-FileAssertHtmlAssert-QueryAssertions
          - FileAssert-FileAssertYamlAssert-QueryAssertions
          - FileAssert-FileAssertJsonAssert-QueryAssertions
        tests:
          - Modeling_QueryAssertions_XmlQueryMeetsCount_NoError

      - id: FileAssert-Modeling-ZipEntryContentAssertions
        title: |
          The Modeling subsystem shall apply the full content assertion suite to matched zip archive
          entries and propagate failures through a scoped context with breadcrumb-style error messages.
        justification: |
          Zip entry content assertions are the primary new capability introduced by the IFileContainer
          abstraction. Verifying at the subsystem level that all content asserter types (text, xml,
          yaml, json) execute correctly through a ZipFileContainer confirms the full integration of
          the IFileContainer abstraction with the existing asserter pipeline. Breadcrumb error messages
          must propagate correctly through the scoped context to give users actionable failure output.
        children:
          - FileAssert-FileAssertZipAssert-EntryMatching
          - FileAssert-FileAssertZipAssert-ParseError
        tests:
          - Modeling_ZipEntryContentAssertions_TextContentPassesWhenConstraintsMet
          - Modeling_ZipEntryContentAssertions_FailureReportsWithBreadcrumbs
