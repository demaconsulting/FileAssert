---
# Software Unit Requirements for the Program Class
#
# The Program class is the main entry point for the tool. It creates a Context
# from command-line arguments, dispatches to the appropriate logic based on the
# flags, and returns the exit code.

sections:
  - title: Program Unit Requirements
    requirements:
      - id: FileAssert-Program-Version
        title: The Program class shall support -v and --version flags to display version information.
        justification: |
          Users need to quickly identify the version of the tool they are using for
          troubleshooting and compatibility verification.
        tests:
          - Program_Run_WithVersionFlag_DisplaysVersionOnly
          - Program_Version_ReturnsNonEmptyString
          - IntegrationTest_VersionFlag_OutputsVersion

      - id: FileAssert-Program-Help
        title: The Program class shall support -?, -h, and --help flags to display usage information.
        justification: |
          Users need access to command-line usage documentation without requiring
          external resources.
        tests:
          - Program_Run_WithHelpFlag_DisplaysUsageInformation
          - IntegrationTest_HelpFlag_OutputsUsageInformation

      - id: FileAssert-Program-Validate
        title: The Program class shall support --validate flag to invoke the self-validation framework.
        justification: |
          Provides a built-in mechanism to verify the tool is functioning correctly
          in the deployment environment.
        tests:
          - Program_Run_WithValidateFlag_RunsValidation
          - IntegrationTest_ValidateFlag_RunsValidation

      - id: FileAssert-Program-ExitCode
        title: The Program class shall return a non-zero exit code on failure.
        justification: |
          Callers (scripts, CI/CD pipelines) must be able to detect failure conditions
          programmatically via the process exit code.
        tests:
          - IntegrationTest_UnknownArgument_ReturnsError

      - id: FileAssert-Program-Config
        title: |
          The Program class shall use the configuration file path from --config (or the default
          '.fileassert.yaml') when loading and executing the YAML test suite.
        justification: |
          The Program class dispatches to RunToolLogic, which reads context.ConfigFile to locate
          the test suite. Capturing this at the requirement level ensures the --config flag is
          explicitly exercised through the full program dispatch path.
        tests:
          - IntegrationTest_ValidConfig_PassingAssertions_ReturnsZero
          - IntegrationTest_ValidConfig_FailingAssertions_ReturnsNonZero

      - id: FileAssert-Program-FilterTests
        title: |
          The Program class shall pass positional name-or-tag filter arguments to the
          configuration runner so that only matching tests are executed.
        justification: |
          The Program class assembles the complete set of arguments and delegates execution to
          FileAssertConfig.Run with context.Filters. A program-level requirement ensures the
          end-to-end path from CLI filter arguments to selective test execution is explicitly
          verified.
        tests:
          - IntegrationTest_TestFiltering_OnlyRunsMatchingTests
