---
# Software Unit Requirements for the Program Class
#
# The Program class is the main entry point for the tool. It creates a Context
# from command-line arguments, dispatches to the appropriate logic based on the
# flags, and returns the exit code.

sections:
  - title: Program Unit Requirements
    requirements:
      - id: FileAssert-Program-Version
        title: The Program class shall support -v and --version flags to display version information.
        justification: |
          Users need to quickly identify the version of the tool they are using for
          troubleshooting and compatibility verification.
        tests:
          - Program_Run_WithVersionFlag_DisplaysVersionOnly
          - Program_Version_ReturnsNonEmptyString

      - id: FileAssert-Program-Help
        title: The Program class shall support -?, -h, and --help flags to display usage information.
        justification: |
          Users need access to command-line usage documentation without requiring
          external resources.
        tests:
          - Program_Run_WithHelpFlag_DisplaysUsageInformation

      - id: FileAssert-Program-Validate
        title: The Program class shall support --validate flag to invoke the self-validation framework.
        justification: |
          Provides a built-in mechanism to verify the tool is functioning correctly
          in the deployment environment.
        tests:
          - Program_Run_WithValidateFlag_RunsValidation

      - id: FileAssert-Program-DefaultBehavior
        title: |
          The Program class shall, when invoked with no arguments, print the application banner
          and then load and execute the default `.fileassert.yaml` configuration.
        justification: |
          When no arguments are supplied the tool prints the version and copyright banner to give
          the user a quick visual confirmation that the tool is installed and operational, then
          proceeds to load and run the default-named configuration from the current working
          directory so the project can be validated with zero configuration.
        tests:
          - Program_Run_NoArguments_DisplaysDefaultBehavior
