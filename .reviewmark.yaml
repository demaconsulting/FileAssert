---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "README.md"
  - "docs/user_guide/**/*.md"
  - "**/*.cs"
  - "requirements.yaml"
  - "docs/reqstream/**/*.yaml"
  - "docs/design/**/*.md"
  - "docs/verification/**/*.md"
  - "!**/obj/**"
  - "!**/bin/**"

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/FileAssert/reviews/index.json

# Review sets following standardized patterns for hierarchical compliance coverage
reviews:
  # Purpose Review (only one per repository)
  - id: FileAssert-Purpose
    title: Review that Advertised Features Match System Design
    paths:
      - "README.md"                                                  # project readme
      - "docs/user_guide/**/*.md"                                    # user guide
      - "docs/reqstream/file-assert/file-assert.yaml"                # system requirements
      - "docs/design/introduction.md"                                # design introduction
      - "docs/design/file-assert/file-assert.md"                     # system design

  # FileAssert-Architecture Review (one per system)
  - id: FileAssert-Architecture
    title: Review that FileAssert Architecture Satisfies Requirements
    paths:
      - "docs/reqstream/file-assert/file-assert.yaml"                # system requirements
      - "docs/design/introduction.md"                                # design introduction
      - "docs/design/file-assert/file-assert.md"                     # system design
      - "docs/verification/file-assert/file-assert.md"               # system verification
      - "test/**/IntegrationTests.cs"                                # integration tests
      - "test/**/AssemblyInfo.cs"                                    # test infrastructure
      - "test/**/Runner.cs"                                          # test infrastructure

  # FileAssert-Design Review (one per system)
  - id: FileAssert-Design
    title: Review that FileAssert Design is Consistent and Complete
    paths:
      - "docs/reqstream/file-assert/file-assert.yaml"                # system requirements
      - "docs/reqstream/file-assert/platform-requirements.yaml"      # platform requirements
      - "docs/design/introduction.md"                                # design introduction
      - "docs/design/file-assert/**/*.md"                            # all system design documents
      - "docs/verification/introduction.md"                          # verification introduction
      - "docs/verification/file-assert/**/*.md"                      # all verification documents

  # FileAssert-AllRequirements Review (one per system)
  - id: FileAssert-AllRequirements
    title: Review that All FileAssert Requirements are Complete
    paths:
      - "requirements.yaml"                                          # root requirements file
      - "docs/reqstream/**/*.yaml"                                   # all requirements files

  # FileAssert-Cli Review (one per subsystem)
  - id: FileAssert-Cli
    title: Review that FileAssert Cli Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/file-assert/cli/cli.yaml"                    # subsystem requirements
      - "docs/design/file-assert/cli/cli.md"                         # subsystem design
      - "docs/verification/file-assert/cli/cli.md"                   # subsystem verification
      - "test/**/Cli/CliTests.cs"                                    # subsystem tests

  # FileAssert-Configuration Review (one per subsystem)
