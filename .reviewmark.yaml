---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "requirements.yaml"          # Root requirements file
  - "docs/reqstream/**/*.yaml"   # Requirements files
  - "docs/design/**/*.md"        # Design documentation
  - "**/*.cs"                    # All C# source and test files
  - "!**/obj/**"                 # Exclude build output
  - "!**/bin/**"                 # Exclude build output

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/FileAssert/reviews/index.json

# Review sets grouping files by logical unit of review.
# Each review-set groups requirements, source, and tests for a coherent software unit
# so that an AI-assisted review can verify consistency across the full evidence chain.
reviews:
  # System review - end-to-end behavior and design overview
  - id: FileAssert-System
    title: Review of FileAssert System
    paths:
      - "docs/reqstream/system.yaml"
      - "docs/design/introduction.md"
      - "docs/design/system.md"
      - "test/**/IntegrationTests.cs"

  # Subsystem reviews - one per subsystem
  - id: FileAssert-Cli
    title: Review of FileAssert Cli Subsystem
    paths:
      - "docs/reqstream/cli/cli.yaml"
      - "docs/design/cli/cli.md"
      - "test/**/CliSubsystemTests.cs"

  - id: FileAssert-Configuration
    title: Review of FileAssert Configuration Subsystem
    paths:
      - "docs/reqstream/configuration/configuration.yaml"
      - "docs/design/configuration/configuration.md"
      - "test/**/ConfigurationSubsystemTests.cs"

  - id: FileAssert-Modeling
    title: Review of FileAssert Modeling Subsystem
    paths:
      - "docs/reqstream/modeling/modeling.yaml"
      - "docs/design/modeling/modeling.md"
      - "test/**/ModelingSubsystemTests.cs"

  - id: FileAssert-Utilities
    title: Review of FileAssert Utilities Subsystem
    paths:
      - "docs/reqstream/utilities/utilities.yaml"
      - "docs/design/utilities/utilities.md"
      - "test/**/UtilitiesSubsystemTests.cs"

  - id: FileAssert-SelfTest
    title: Review of FileAssert SelfTest Subsystem
    paths:
      - "docs/reqstream/selftest/selftest.yaml"
      - "docs/design/selftest/selftest.md"
      - "test/**/SelfTestSubsystemTests.cs"

  # Software unit reviews - one per class
  - id: FileAssert-Context
    title: Review of FileAssert Context Unit
    paths:
      - "docs/reqstream/cli/context.yaml"
      - "docs/design/cli/context.md"
      - "src/**/Context.cs"
      - "test/**/ContextTests.cs"
      - "test/**/ContextNewPropertiesTests.cs"

  - id: FileAssert-Program
    title: Review of FileAssert Program Unit
    paths:
      - "docs/reqstream/program.yaml"
      - "docs/design/program.md"
      - "src/**/Program.cs"
      - "test/**/ProgramTests.cs"
      - "test/**/Runner.cs"
      - "test/**/AssemblyInfo.cs"

  - id: FileAssert-Validation
    title: Review of FileAssert Validation Unit
    paths:
      - "docs/reqstream/selftest/validation.yaml"
      - "docs/design/selftest/validation.md"
      - "src/**/Validation.cs"
      - "test/**/ValidationTests.cs"

  - id: FileAssert-PathHelpers
    title: Review of FileAssert PathHelpers Unit
    paths:
      - "docs/reqstream/utilities/path-helpers.yaml"
      - "docs/design/utilities/path-helpers.md"
      - "src/**/PathHelpers.cs"
      - "test/**/PathHelpersTests.cs"

  - id: FileAssert-FileAssertRule
    title: Review of FileAssert FileAssertRule Unit
    paths:
      - "docs/reqstream/modeling/file-assert-rule.yaml"
      - "docs/design/modeling/file-assert-rule.md"
      - "src/**/FileAssertRule.cs"
      - "test/**/FileAssertRuleTests.cs"

  - id: FileAssert-FileAssertFile
    title: Review of FileAssert FileAssertFile Unit
    paths:
      - "docs/reqstream/modeling/file-assert-file.yaml"
      - "docs/design/modeling/file-assert-file.md"
      - "src/**/FileAssertFile.cs"
      - "test/**/FileAssertFileTests.cs"

  - id: FileAssert-FileAssertTest
    title: Review of FileAssert FileAssertTest Unit
    paths:
      - "docs/reqstream/modeling/file-assert-test.yaml"
      - "docs/design/modeling/file-assert-test.md"
      - "src/**/FileAssertTest.cs"
      - "test/**/FileAssertTestTests.cs"

  - id: FileAssert-FileAssertConfig
    title: Review of FileAssert FileAssertConfig Unit
    paths:
      - "docs/reqstream/configuration/file-assert-config.yaml"
      - "docs/design/configuration/file-assert-config.md"
      - "src/**/FileAssertConfig.cs"
      - "test/**/FileAssertConfigTests.cs"

  - id: FileAssert-FileAssertData
    title: Review of FileAssert FileAssertData Unit
    paths:
      - "docs/reqstream/configuration/file-assert-data.yaml"
      - "docs/design/configuration/file-assert-data.md"
      - "src/**/FileAssertData.cs"
      - "test/**/FileAssertConfigTests.cs"
      - "test/**/FileAssertFileTests.cs"
      - "test/**/FileAssertRuleTests.cs"

  # Platform and OTS dependency reviews
  - id: Platform-Support
    title: Review of Platform and Runtime Support Requirements
    paths:
      - "docs/reqstream/platform-requirements.yaml"
      - "test/**/IntegrationTests.cs"

  - id: OTS-Dependencies
    title: Review of Off-The-Shelf Software Dependencies
    paths:
      - "docs/reqstream/ots/mstest.yaml"
      - "docs/reqstream/ots/reqstream.yaml"
      - "docs/reqstream/ots/buildmark.yaml"
      - "docs/reqstream/ots/versionmark.yaml"
      - "docs/reqstream/ots/sarifmark.yaml"
      - "docs/reqstream/ots/sonarmark.yaml"
      - "docs/reqstream/ots/reviewmark.yaml"
      - "test/**/IntegrationTests.cs"
