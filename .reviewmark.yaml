---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "requirements.yaml"          # Root requirements file
  - "docs/reqstream/**/*.yaml"   # Requirements files
  - "docs/design/**/*.md"        # Design documentation
  - "**/*.cs"                    # All C# source and test files
  - "!**/obj/**"                 # Exclude build output
  - "!**/bin/**"                 # Exclude build output

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/FileAssert/reviews/index.json

# Review sets grouping files by logical unit of review.
# Each review-set groups requirements, source, and tests for a coherent software unit
# so that an AI-assisted review can verify consistency across the full evidence chain.
reviews:
  # Purpose review - user-facing capabilities and system promises
  - id: FileAssert-Purpose
    title: Review that Advertised Features Match System Design
    paths:
      - "README.md"
      - "docs/user_guide/**/*.md"
      - "docs/reqstream/file-assert/file-assert.yaml"
      - "docs/design/introduction.md"
      - "docs/design/file-assert/file-assert.md"

  # Architecture review - end-to-end behavior and design overview
  - id: FileAssert-Architecture
    title: Review that FileAssert Architecture Satisfies Requirements
    paths:
      - "docs/reqstream/file-assert/file-assert.yaml"
      - "docs/design/introduction.md"
      - "docs/design/file-assert/file-assert.md"
      - "test/**/IntegrationTests.cs"

  # Design review - all design documentation and platform/system requirements
  - id: FileAssert-Design
    title: Review that FileAssert Design is Consistent and Complete
    paths:
      - "docs/reqstream/file-assert/file-assert.yaml"
      - "docs/reqstream/file-assert/platform-requirements.yaml"
      - "docs/design/**/*.md"

  # All-requirements review - all requirement files
  - id: FileAssert-AllRequirements
    title: Review that All FileAssert Requirements are Complete
    paths:
      - "requirements.yaml"
      - "docs/reqstream/**/*.yaml"

  # Subsystem reviews - one per subsystem
  - id: FileAssert-Cli
    title: Review that FileAssert Cli Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/file-assert/cli/cli.yaml"
      - "docs/design/file-assert/cli/cli.md"
      - "test/**/CliSubsystemTests.cs"

  - id: FileAssert-Configuration
    title: Review that FileAssert Configuration Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/file-assert/configuration/configuration.yaml"
      - "docs/design/file-assert/configuration/configuration.md"
      - "test/**/ConfigurationSubsystemTests.cs"

  - id: FileAssert-Modeling
    title: Review that FileAssert Modeling Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/file-assert/modeling/modeling.yaml"
      - "docs/design/file-assert/modeling/modeling.md"
      - "test/**/ModelingSubsystemTests.cs"

  - id: FileAssert-Utilities
    title: Review that FileAssert Utilities Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/file-assert/utilities/utilities.yaml"
      - "docs/design/file-assert/utilities/utilities.md"
      - "test/**/UtilitiesSubsystemTests.cs"

  - id: FileAssert-SelfTest
    title: Review that FileAssert SelfTest Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/file-assert/selftest/selftest.yaml"
      - "docs/design/file-assert/selftest/selftest.md"
      - "test/**/SelfTestSubsystemTests.cs"

  # Software unit reviews - one per class ([System]-[Subsystem]-[Unit])
  - id: FileAssert-Cli-Context
    title: Review that FileAssert Cli Context Implementation is Correct
    paths:
      - "docs/reqstream/file-assert/cli/context.yaml"
      - "docs/design/file-assert/cli/context.md"
      - "src/**/Context.cs"
