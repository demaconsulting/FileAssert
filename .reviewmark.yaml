---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "requirements.yaml"          # Root requirements file
  - "docs/reqstream/**/*.yaml"   # Requirements files
  - "docs/design/**/*.md"        # Design documentation
  - "**/*.cs"                    # All C# source and test files
  - "!**/obj/**"                 # Exclude build output
  - "!**/bin/**"                 # Exclude build output

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/FileAssert/reviews/index.json

# Review sets grouping files by logical unit of review.
# Each review-set groups requirements, source, and tests for a coherent software unit
# so that an AI-assisted review can verify consistency across the full evidence chain.
reviews:
  # Architecture review - end-to-end behavior and design overview
  - id: FileAssert-Architecture
    title: Review of FileAssert Architecture
    paths:
      - "docs/reqstream/file-assert/file-assert.yaml"
      - "docs/design/introduction.md"
      - "docs/design/file-assert/file-assert.md"
      - "test/**/IntegrationTests.cs"

  # Design review - all design documentation and platform/system requirements
  - id: FileAssert-Design
    title: Review of FileAssert Design Documentation
    paths:
      - "docs/reqstream/file-assert/file-assert.yaml"
      - "docs/reqstream/file-assert/platform-requirements.yaml"
      - "docs/design/**/*.md"

  # All-requirements review - all requirement files
  - id: FileAssert-AllRequirements
    title: Review of All FileAssert Requirements
    paths:
      - "requirements.yaml"
      - "docs/reqstream/file-assert/**/*.yaml"

  # Subsystem reviews - one per subsystem
  - id: FileAssert-Cli
    title: Review of FileAssert Cli Subsystem
    paths:
      - "docs/reqstream/file-assert/cli/cli.yaml"
      - "docs/design/file-assert/cli/cli.md"
      - "test/**/CliSubsystemTests.cs"

  - id: FileAssert-Configuration
    title: Review of FileAssert Configuration Subsystem
    paths:
      - "docs/reqstream/file-assert/configuration/configuration.yaml"
      - "docs/design/file-assert/configuration/configuration.md"
      - "test/**/ConfigurationSubsystemTests.cs"

  - id: FileAssert-Modeling
    title: Review of FileAssert Modeling Subsystem
    paths:
      - "docs/reqstream/file-assert/modeling/modeling.yaml"
      - "docs/design/file-assert/modeling/modeling.md"
      - "test/**/ModelingSubsystemTests.cs"

  - id: FileAssert-Utilities
    title: Review of FileAssert Utilities Subsystem
    paths:
      - "docs/reqstream/file-assert/utilities/utilities.yaml"
      - "docs/design/file-assert/utilities/utilities.md"
      - "test/**/UtilitiesSubsystemTests.cs"

  - id: FileAssert-SelfTest
    title: Review of FileAssert SelfTest Subsystem
    paths:
      - "docs/reqstream/file-assert/selftest/selftest.yaml"
      - "docs/design/file-assert/selftest/selftest.md"
      - "test/**/SelfTestSubsystemTests.cs"

  # Software unit reviews - one per class ([System]-[Subsystem]-[Unit])
  - id: FileAssert-Cli-Context
    title: Review of FileAssert Context Unit
    paths:
      - "docs/reqstream/file-assert/cli/context.yaml"
      - "docs/design/file-assert/cli/context.md"
      - "src/**/Context.cs"
      - "test/**/ContextTests.cs"
      - "test/**/ContextNewPropertiesTests.cs"

  - id: FileAssert-Program
    title: Review of FileAssert Program Unit
    paths:
      - "docs/reqstream/file-assert/program.yaml"
      - "docs/design/file-assert/program.md"
      - "src/**/Program.cs"
      - "test/**/ProgramTests.cs"
      - "test/**/Runner.cs"
      - "test/**/AssemblyInfo.cs"

  - id: FileAssert-SelfTest-Validation
    title: Review of FileAssert Validation Unit
    paths:
      - "docs/reqstream/file-assert/selftest/validation.yaml"
      - "docs/design/file-assert/selftest/validation.md"
      - "src/**/Validation.cs"
      - "test/**/ValidationTests.cs"

  - id: FileAssert-Utilities-PathHelpers
    title: Review of FileAssert PathHelpers Unit
    paths:
      - "docs/reqstream/file-assert/utilities/path-helpers.yaml"
      - "docs/design/file-assert/utilities/path-helpers.md"
      - "src/**/PathHelpers.cs"
      - "test/**/PathHelpersTests.cs"

  - id: FileAssert-Modeling-FileAssertRule
    title: Review of FileAssert FileAssertRule Unit
    paths:
      - "docs/reqstream/file-assert/modeling/file-assert-rule.yaml"
      - "docs/design/file-assert/modeling/file-assert-rule.md"
      - "src/**/FileAssertRule.cs"
      - "test/**/FileAssertRuleTests.cs"

  - id: FileAssert-Modeling-FileAssertFile
    title: Review of FileAssert FileAssertFile Unit
    paths:
      - "docs/reqstream/file-assert/modeling/file-assert-file.yaml"
      - "docs/design/file-assert/modeling/file-assert-file.md"
      - "src/**/FileAssertFile.cs"
      - "test/**/FileAssertFileTests.cs"

  - id: FileAssert-Modeling-FileAssertTest
    title: Review of FileAssert FileAssertTest Unit
    paths:
      - "docs/reqstream/file-assert/modeling/file-assert-test.yaml"
      - "docs/design/file-assert/modeling/file-assert-test.md"
      - "src/**/FileAssertTest.cs"
      - "test/**/FileAssertTestTests.cs"

  - id: FileAssert-Configuration-FileAssertConfig
    title: Review of FileAssert FileAssertConfig Unit
    paths:
      - "docs/reqstream/file-assert/configuration/file-assert-config.yaml"
      - "docs/design/file-assert/configuration/file-assert-config.md"
      - "src/**/FileAssertConfig.cs"
      - "test/**/FileAssertConfigTests.cs"

  - id: FileAssert-Configuration-FileAssertData
    title: Review of FileAssert FileAssertData Unit
    paths:
      - "docs/reqstream/file-assert/configuration/file-assert-data.yaml"
      - "docs/design/file-assert/configuration/file-assert-data.md"
      - "src/**/FileAssertData.cs"
      - "test/**/FileAssertConfigTests.cs"
      - "test/**/FileAssertFileTests.cs"
      - "test/**/FileAssertRuleTests.cs"

  # Platform and OTS dependency reviews
  - id: FileAssert-Platform
    title: Review of Platform and Runtime Support Requirements
    paths:
      - "docs/reqstream/file-assert/platform-requirements.yaml"
      - "docs/design/file-assert/platform.md"
      - "test/**/IntegrationTests.cs"

  - id: FileAssert-OtsDependencies
    title: Review of Off-The-Shelf Software Dependencies
    paths:
      - "docs/reqstream/ots/**/*.yaml"
      - "docs/design/file-assert/ots-dependencies.md"
