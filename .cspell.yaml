---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - Misspelled words should be fixed in the source
# - NEVER add a misspelled word to the 'words' list
# - PROPOSE only genuine technical terms/names as needed

version: '0.2'

language: en

# Project-specific technical terms and tool names
words:
  - appsettings
  - artifacts
  - artefacts
  - behavior
  - behaviour
  - buildmark
  - Dema
  - demaconsulting
  - deserialize
  - deserializes
  - dogfooding
  - enation
  - fileassert
  - fontconfig
  - initialise
  - initialized
  - initialisation
  - Linq
  - materialize
  - materialise
  - Pango
  - pandoc
  - pandoctool
  - recognized
  - recognise
  - recognises
  - recognised
  - reqstream
  - reviewmark
  - Sarif
  - sarifmark
  - selftest
  - serialize
  - serializes
  - serialise
  - serialises
  - sonarcloud
  - sonarmark
  - unrecognized
  - unrecognised
  - versionmark
  - Weasyprint
  - weasyprinttool
  - xunit
  - yamlfix

# Exclude common build artifacts, dependencies, and vendored third-party code
ignorePaths:
  - '**/.git/**'
  - '**/node_modules/**'
  - '**/.venv/**'
  - '**/thirdparty/**'
  - '**/third-party/**'
  - '**/3rd-party/**'
  - '**/.agent-logs/**'
  - '**/bin/**'
  - '**/obj/**'
  - '**/generated/**'
  - package-lock.json
